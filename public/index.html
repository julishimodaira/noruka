<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- PWA / iOS meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Noruka" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#080b14" />

    <!-- iOS splash screens (covers common iPhone sizes) -->
    <link rel="apple-touch-startup-image" href="splash/splash-1170x2532.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="splash/splash-1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="splash/splash-1242x2688.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" />

    <!-- iOS home screen icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120.png" />

    <!-- Standard favicon + manifest -->
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- SEO / share metadata -->
    <meta name="description" content="Accessible Japan rail guide. Real elevator status, wheelchair car positions, platform gaps, and emergency support for 69 stations across Tokyo, Osaka, Kyoto, Sapporo and Fukuoka." />
    <meta property="og:title" content="Noruka — Accessible Japan Rail" />
    <meta property="og:description" content="Navigate Japan's rail network with confidence. Elevators, wheelchair cars, platform gaps, staff assistance, and emergency support." />
    <meta property="og:type" content="website" />

    <title>Noruka — Accessible Japan Rail</title>

    <!-- Service worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(reg) { console.log('SW registered'); })
            .catch(function(err) { console.log('SW failed:', err); });
        });
      }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run Noruka.</noscript>
    <div id="root"></div>
  </body>
</html>
